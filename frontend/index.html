<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Navodaya Elevate | Empowering Navodaya Students for a Brighter Future</title>

    <meta
      name="description"
      content="Navodaya Elevate supports Navodaya students through mentorship, career guidance, skill development programs, and a strong alumni community to help them succeed."
    />

    <meta name="author" content="VElevateU Team" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://velevateu.com" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp) -->
    <meta property="og:title" content="Navodaya Elevate | Empowering Students for a Brighter Future" />

    <meta
      property="og:description"
      content="Navodaya Elevate is a platform dedicated to helping Navodaya students grow through mentorship, career guidance, skill development programs, and community support."
    />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://velevateu.com" />
    <meta property="og:image" content="https://velevateu.com/assets/og-image.png" />
    <meta property="og:site_name" content="Navodaya Elevate" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="Navodaya Elevate | Empowering Navodaya Students" />

    <meta
      name="twitter:description"
      content="Supporting Navodaya students with mentorship, career guidance, and growth opportunities."
    />

    <meta name="twitter:image" content="https://velevateu.com/assets/og-image.png" />

    <!-- Structured Data (SEO) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Navodaya Elevate",
        "url": "https://velevateu.com",
        "logo": "https://velevateu.com/assets/favicon.png",
        "description": "Navodaya Elevate is a platform dedicated to helping Navodaya students grow through mentorship, educational programs, and career guidance.",
        "sameAs": [
          "https://www.linkedin.com",
          "https://www.instagram.com",
          "https://www.youtube.com"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Fallback if JavaScript disabled -->
    <noscript>
      <h1>Navodaya Elevate</h1>
      <p>
        Empowering Navodaya students for a brighter future through mentorship,
        career guidance, educational programs, and community support.
      </p>
    </noscript>
  </body>
</html>
